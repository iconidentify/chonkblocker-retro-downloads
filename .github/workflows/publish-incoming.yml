name: Publish validated Retro release

on:
  push:
    branches:
      - 'incoming/**'

permissions:
  contents: write

concurrency:
  group: public-retro-release
  cancel-in-progress: false

jobs:
  publish:
    name: Publish public downloads
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Validate incoming release
        run: python3 scripts/release_index.py validate payload
      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail
          version="$(python3 -c 'import json; print(json.load(open("payload/release.json"))["version"])')"
          title="$(python3 -c 'import json; print(json.load(open("payload/release.json"))["title"])')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "title=$title" >> "$GITHUB_OUTPUT"
      - name: Create or update public release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_TITLE: ${{ steps.release.outputs.title }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TITLE" --notes-file payload/release-notes.md
          else
            gh release create "$RELEASE_TAG" --target master --title "$RELEASE_TITLE" --notes-file payload/release-notes.md
          fi
          gh release upload "$RELEASE_TAG" payload/artifacts/* payload/release.json --clobber
      - name: Update public version index
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          payload_copy="$RUNNER_TEMP/retro-release-payload"
          cp -R payload "$payload_copy"
          git fetch origin master
          git switch master
          python3 scripts/release_index.py update-index "$payload_copy" .
          git config user.name 'chonkblocker-release-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add latest.json releases.json "releases/v$RELEASE_VERSION.json" "releases/v$RELEASE_VERSION.md"
          if ! git diff --cached --quiet; then
            git commit -m "Publish Chonk Blocker Retro $RELEASE_VERSION"
            git push origin master
          fi
      - name: Remove incoming branch
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method DELETE "repos/$GITHUB_REPOSITORY/git/refs/heads/$GITHUB_REF_NAME"
